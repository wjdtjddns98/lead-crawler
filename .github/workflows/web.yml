name: Web CI

# 프론트엔드(web/) 전용 — web/** 가 바뀐 PR/푸시에만 돈다.
# 역할 분담: 이 파일·web/** 는 프론트 개발자 소유(백엔드는 관여하지 않음).
on:
  push:
    branches: [main]
    paths: ['web/**']
  pull_request:
    branches: [main]
    paths: ['web/**']

jobs:
  web-build:
    name: 프론트엔드 빌드(타입체크)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install + build (tsc --noEmit + vite build)
        working-directory: web
        run: |
          npm ci
          npm run build
